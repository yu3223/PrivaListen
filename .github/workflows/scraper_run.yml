name: Run ETF Premium Scraper

on:
  workflow_dispatch:
  schedule:
    # 涵蓋台灣時間 09:05 到 12:35 (對應 UTC 01:00 到 04:59)
    # 每個小時的 05分 和 35分 執行
    - cron: '5,35 1-4 * * 1-5'
    
    # 單獨指定台灣時間 13:05 (對應 UTC 05:05)
    - cron: '5 5 * * 1-5' 

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        # --with-deps 是確保 Linux 系統能順利執行 Chromium 的核心關鍵 🌟
        playwright install --with-deps chromium

    - name: Execute Scraper Script
      env:
        # 將 GitHub Secrets 對應給 Python 程式讀取
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
      run: python scraper.py