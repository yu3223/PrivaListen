name: Run ETF Premium Scraper

on:
  # 1. 支援手動點擊執行
  workflow_dispatch:
  # 2. 定時排程：每週一至週五，台灣時間 AM 09:03 到 PM 13:03，每半小時跑一次
  schedule:
    - cron: '*/20 0-5 * * 1-5'  

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        # --with-deps 是確保 Linux 系統能順利執行 Chromium 的核心關鍵 🌟
        playwright install --with-deps chromium

    - name: Execute Scraper Script
      env:
        # 將 GitHub Secrets 對應給 Python 程式讀取
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_TO_ID: ${{ secrets.LINE_TO_ID }}
      run: python scraper.py